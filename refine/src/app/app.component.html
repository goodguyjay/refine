<main class="container">
    <h1>refine</h1>
    <p>beautiful PDFs from markdown, effortlessly</p>

    <div class="row">
        <button
                type="button"
                (click)="openFile()"
                [disabled]="isLoading()">
            {{ isLoading() ? 'loading...' : 'open markdown file' }}
        </button>
    </div>

    @if (error()) {
        <div class="error">
            <p>error: {{ error() }}</p>
        </div>
    }

    @if (currentFile(); as file) {
        <div class="file-info">
            <h2>{{ file.name }}</h2>
            <p><strong>size:</strong> {{ file.size | number }} bytes</p>
        </div>

        <app-preview [markdownContent]="file.content"/>
    }

    <router-outlet/>
</main>
